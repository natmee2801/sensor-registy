<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vue.js Basics Quiz - 50 ข้อ</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-2: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --primary: #42b883;
    --primary-dark: #35495e;
    --correct: #22c55e;
    --wrong: #ef4444;
    --border: #475569;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header {
    text-align: center;
    padding: 30px 20px;
    background: var(--card);
    border-radius: 16px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  header h1 {
    margin: 0 0 8px;
    font-size: 28px;
    color: var(--primary);
  }
  header p { margin: 4px 0; color: var(--muted); }
  .progress-bar {
    position: sticky;
    top: 10px;
    z-index: 10;
    background: var(--card);
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
  }
  .progress-track {
    flex: 1;
    height: 8px;
    background: var(--card-2);
    border-radius: 4px;
    margin: 0 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0%;
    transition: width 0.3s ease;
  }
  .question {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .question:hover { border-color: var(--primary); }
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .q-num {
    background: var(--primary);
    color: #0f172a;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 13px;
    flex-shrink: 0;
    min-width: 36px;
    text-align: center;
  }
  .q-tag {
    background: var(--primary-dark);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 500;
    margin: 0;
    flex: 1;
  }
  .q-text code {
    background: #0f172a;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
    color: #fbbf24;
  }
  .options { display: grid; gap: 8px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card-2);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .option:hover { border-color: var(--primary); }
  .option input { accent-color: var(--primary); width: 18px; height: 18px; cursor: pointer; }
  .option span { flex: 1; }
  .option code {
    background: #0f172a;
    padding: 2px 6px;
    border-radius: 4px;
    color: #fbbf24;
    font-size: 13px;
  }
  .option.correct {
    border-color: var(--correct);
    background: rgba(34, 197, 94, 0.15);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: rgba(239, 68, 68, 0.15);
  }
  .explanation {
    margin-top: 12px;
    padding: 12px 16px;
    background: rgba(66, 184, 131, 0.1);
    border-left: 3px solid var(--primary);
    border-radius: 6px;
    font-size: 14px;
    color: var(--muted);
    display: none;
  }
  .explanation.show { display: block; }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 30px 0;
    flex-wrap: wrap;
  }
  button {
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(0); }
  .btn-primary { background: var(--primary); color: #0f172a; }
  .btn-secondary { background: var(--card-2); color: var(--text); border: 1px solid var(--border); }
  .result-card {
    background: var(--card);
    border: 2px solid var(--primary);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }
  .result-card.show { display: block; }
  .result-score {
    font-size: 48px;
    font-weight: 800;
    color: var(--primary);
    margin: 10px 0;
  }
  .result-msg { font-size: 18px; color: var(--muted); }

  /* note textarea */
  .note-toggle {
    margin-top: 14px;
    border-top: 1px dashed var(--border);
    padding-top: 12px;
  }
  .note-toggle summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    user-select: none;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .note-toggle summary::-webkit-details-marker { display: none; }
  .note-toggle summary::before { content: "▸"; transition: transform 0.15s; display: inline-block; }
  .note-toggle[open] summary::before { transform: rotate(90deg); }
  .note-toggle summary:hover { color: var(--primary); }
  .user-note {
    width: 100%;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--card-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: vertical;
    min-height: 60px;
    transition: border-color 0.15s;
  }
  .user-note:focus { outline: none; border-color: var(--primary); }
  .user-note.has-content { border-left: 3px solid var(--primary); }

  /* db status badge */
  .db-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
  }
  .db-status::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #6b7280;
  }
  .db-status.ready::before { background: var(--correct); }
  .db-status.saving::before { background: #fbbf24; animation: pulse 1s infinite; }
  .db-status.error::before { background: var(--wrong); }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* extra action buttons */
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* history panel */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: none;
  }
  .panel.show { display: block; }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .panel-header h2 { margin: 0; font-size: 18px; color: var(--primary); }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--card-2);
    border-radius: 8px;
    margin-bottom: 8px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .badge {
    background: var(--primary);
    color: #0f172a;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 13px;
    margin-right: 8px;
  }
  .muted { color: var(--muted); font-size: 13px; }
  .detail-row {
    padding: 10px 12px;
    background: var(--card-2);
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .detail-row.correct { border-left: 3px solid var(--correct); }
  .detail-row.wrong { border-left: 3px solid var(--wrong); }
  .detail-row.skipped { border-left: 3px solid var(--muted); opacity: 0.85; }
  .detail-row .note {
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(66, 184, 131, 0.1);
    border-left: 2px solid var(--primary);
    border-radius: 4px;
    color: var(--text);
    white-space: pre-wrap;
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    header h1 { font-size: 22px; }
    .question { padding: 16px; }
    .q-text { font-size: 14px; }
    .actions button { flex: 1 1 calc(50% - 12px); }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>Vue.js Basics Quiz</h1>
    <p>50 ข้อ — ครอบคลุม structure, state, props, methods, template, CSS</p>
    <p style="font-size:13px">
      เลือกคำตอบ + กรอกเหตุผล/คำอธิบายของคุณ ข้อมูลถูกบันทึกอัตโนมัติเป็น SQLite ในเบราว์เซอร์
      <span id="dbStatus" class="db-status">กำลังโหลด DB...</span>
    </p>
  </header>

  <div class="progress-bar">
    <span id="progressText">ตอบแล้ว 0/50</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span id="progressPercent">0%</span>
  </div>

  <div id="resultCard" class="result-card">
    <div class="result-msg">คะแนนของคุณ</div>
    <div class="result-score"><span id="score">0</span> / 50</div>
    <div class="result-msg" id="grade"></div>
  </div>

  <div id="historyPanel" class="panel">
    <div class="panel-header">
      <h2>📚 ประวัติการทำ Quiz</h2>
      <button type="button" class="btn-ghost btn-sm" id="closeHistoryBtn">ปิด</button>
    </div>
    <div id="historyList"></div>
  </div>

  <div id="detailPanel" class="panel">
    <div class="panel-header">
      <h2 id="detailTitle">รายละเอียด Attempt</h2>
      <button type="button" class="btn-ghost btn-sm" id="closeDetailBtn">ปิด</button>
    </div>
    <div id="detailList"></div>
  </div>

  <form id="quizForm"></form>

  <div class="actions">
    <button type="button" class="btn-primary" id="submitBtn">ส่งคำตอบ</button>
    <button type="button" class="btn-secondary" id="resetBtn">เริ่ม Attempt ใหม่</button>
    <button type="button" class="btn-ghost" id="historyBtn">📚 ดูประวัติ</button>
    <button type="button" class="btn-ghost" id="exportBtn">📥 Export .sqlite</button>
    <button type="button" class="btn-ghost" id="importBtn">📤 Import .sqlite</button>
    <input type="file" id="importFile" accept=".sqlite,.db,application/x-sqlite3" style="display:none">
  </div>
</div>

<script>
const questions = [
  // ===== Structure (1-5) =====
  { tag: "Structure", q: "ไฟล์ Vue Single File Component (SFC) ใช้นามสกุลอะไร?",
    options: [".vue", ".js", ".html", ".vsfc"], answer: 0,
    exp: "Vue ใช้ไฟล์นามสกุล .vue ที่รวม template, script, style ในไฟล์เดียว" },
  { tag: "Structure", q: "ใน SFC มี block หลัก 3 block ข้อใด <strong>ไม่ใช่</strong>?",
    options: ["<code>&lt;template&gt;</code>", "<code>&lt;script&gt;</code>", "<code>&lt;style&gt;</code>", "<code>&lt;data&gt;</code>"], answer: 3,
    exp: "SFC มี 3 block: template, script, style เท่านั้น (data เป็น property ใน Options API)" },
  { tag: "Structure", q: "การสร้าง Vue 3 application instance ใช้ฟังก์ชันใด?",
    options: ["<code>new Vue()</code>", "<code>createApp()</code>", "<code>mountApp()</code>", "<code>Vue.init()</code>"], answer: 1,
    exp: "Vue 3 ใช้ createApp(RootComponent) แทน new Vue() ของ Vue 2" },
  { tag: "Structure", q: "การ mount Vue app เข้ากับ DOM element ใช้ method ใด?",
    options: [".attach()", ".render()", ".mount()", ".bind()"], answer: 2,
    exp: "createApp(App).mount('#app') คือการ mount เข้า DOM element ที่มี id='app'" },
  { tag: "Structure", q: "ใน Composition API เขียน reactive logic ไว้ที่ไหน?",
    options: ["<code>data()</code>", "<code>setup()</code> หรือ <code>&lt;script setup&gt;</code>", "<code>methods</code>", "<code>created()</code>"], answer: 1,
    exp: "Composition API ใช้ setup() function หรือ <script setup> syntactic sugar" },

  // ===== State / ref / reactive (6-10) =====
  { tag: "State", q: "สร้าง reactive primitive value ใน Composition API ใช้?",
    options: ["<code>reactive()</code>", "<code>ref()</code>", "<code>computed()</code>", "<code>state()</code>"], answer: 1,
    exp: "ref() ใช้กับค่า primitive (number, string, boolean) — reactive() ใช้กับ object" },
  { tag: "State", q: "เข้าถึงค่าของ <code>ref</code> ใน <code>&lt;script&gt;</code> ต้องใช้?",
    options: [".value", ".data", ".ref", "ตรงๆ ไม่ต้องอะไร"], answer: 0,
    exp: "ใน script ต้องใช้ count.value แต่ใน template เข้าถึงตรงๆ ได้เลย {{ count }}" },
  { tag: "State", q: "ใน <code>&lt;template&gt;</code> เข้าถึง ref <code>count</code> เขียนยังไง?",
    options: ["{{ count.value }}", "{{ ref.count }}", "{{ count }}", "{{ this.count }}"], answer: 2,
    exp: "Vue auto-unwraps ref ใน template — ไม่ต้องใส่ .value" },
  { tag: "State", q: "ฟังก์ชันใดเหมาะสำหรับสร้าง reactive object?",
    options: ["<code>ref()</code>", "<code>reactive()</code>", "<code>watch()</code>", "<code>observable()</code>"], answer: 1,
    exp: "reactive() เหมาะกับ object/array — เก็บ deep reactivity โดยไม่ต้องใช้ .value" },
  { tag: "State", q: "<code>const state = reactive({ count: 0 })</code> เพิ่มค่า count ยังไง?",
    options: ["state.value.count++", "state.count++", "state.count.value++", "state++"], answer: 1,
    exp: "reactive object ใช้ตรงๆ ไม่มี .value (ต่างจาก ref)" },

  // ===== Props (11-15) =====
  { tag: "Props", q: "ประกาศ props ใน <code>&lt;script setup&gt;</code> ใช้?",
    options: ["<code>props()</code>", "<code>useProps()</code>", "<code>defineProps()</code>", "<code>getProps()</code>"], answer: 2,
    exp: "defineProps เป็น compiler macro ไม่ต้อง import ใน <script setup>" },
  { tag: "Props", q: "ทิศทางการไหลของข้อมูลผ่าน props ใน Vue คือ?",
    options: ["two-way binding", "one-way (parent → child)", "two-way (parent ↔ child)", "child → parent"], answer: 1,
    exp: "Props ใน Vue เป็น one-way data flow — parent ส่งให้ child เท่านั้น" },
  { tag: "Props", q: "ส่ง props จาก parent ที่มีค่าจากตัวแปร <code>title</code> เขียน?",
    options: ["<code>title=\"title\"</code>", "<code>:title=\"title\"</code>", "<code>@title=\"title\"</code>", "<code>#title=\"title\"</code>"], answer: 1,
    exp: ":title ย่อมาจาก v-bind:title — ส่งค่า JS expression แทน string literal" },
  { tag: "Props", q: "ใน child component สามารถแก้ไข prop ที่รับมาได้หรือไม่?",
    options: ["ได้เสมอ", "ไม่ได้ (read-only)", "ได้เฉพาะ object", "ขึ้นกับ Vue version"], answer: 1,
    exp: "Vue เตือนถ้า mutate prop โดยตรง — ต้อง emit event ให้ parent อัปเดตแทน" },
  { tag: "Props", q: "กำหนด default ของ prop ใน defineProps แบบ object เขียนยังไง?",
    options: ["<code>{ count: 0 }</code>", "<code>{ count: { type: Number, default: 0 } }</code>", "<code>{ count: Number(0) }</code>", "<code>{ count = 0 }</code>"], answer: 1,
    exp: "ต้องใช้ object form { type, default, required, validator }" },

  // ===== Computed (16-20) =====
  { tag: "Computed", q: "ฟังก์ชันใดใช้สร้าง computed property ใน Composition API?",
    options: ["<code>watch()</code>", "<code>computed()</code>", "<code>ref()</code>", "<code>reactive()</code>"], answer: 1,
    exp: "computed() คืน ref ที่อัปเดตอัตโนมัติเมื่อ dependencies เปลี่ยน" },
  { tag: "Computed", q: "ข้อใดถูกต้องเกี่ยวกับ computed?",
    options: ["รันใหม่ทุกครั้งที่ render", "cache ตาม reactive dependencies", "ต้อง async", "ใช้กับ DOM ไม่ได้"], answer: 1,
    exp: "computed cache ผลลัพธ์และคำนวณใหม่เฉพาะเมื่อ reactive dependency เปลี่ยน" },
  { tag: "Computed", q: "ความต่างหลักระหว่าง computed กับ method ในการแสดงผล?",
    options: ["ไม่ต่างกัน", "computed cache ส่วน method run ทุกครั้งที่ re-render", "method ดีกว่า", "computed ช้ากว่า"], answer: 1,
    exp: "ใช้ computed เมื่อค่ามาจาก reactive deps — performance ดีกว่าเรียก method ใน template" },
  { tag: "Computed", q: "computed สามารถมีทั้ง getter และ setter ได้หรือไม่?",
    options: ["ไม่ได้", "ได้ ผ่าน <code>{ get, set }</code>", "ได้แต่ใน Options API เท่านั้น", "ต้องใช้ ref แทน"], answer: 1,
    exp: "computed({ get: () => ..., set: v => ... }) สำหรับ writable computed" },
  { tag: "Computed", q: "ใน <code>&lt;script&gt;</code> เข้าถึงค่า computed ใช้?",
    options: ["ตรงๆ", ".value", ".compute()", ".get()"], answer: 1,
    exp: "computed() คืน ref ดังนั้นต้องใช้ .value ใน script (template auto-unwrap)" },

  // ===== Methods / Events (21-25) =====
  { tag: "Events", q: "binding event click กับ method ที่ถูกต้อง?",
    options: ["<code>:click=\"fn\"</code>", "<code>@click=\"fn\"</code>", "<code>#click=\"fn\"</code>", "<code>onclick=\"fn\"</code>"], answer: 1,
    exp: "@click ย่อมาจาก v-on:click" },
  { tag: "Events", q: "ส่ง argument ไป method ใน template เขียน?",
    options: ["<code>@click=\"fn|arg\"</code>", "<code>@click=\"fn(arg)\"</code>", "<code>@click=\"fn:arg\"</code>", "<code>@click=fn arg</code>"], answer: 1,
    exp: "เรียก function แบบปกติ @click=\"handler(item.id)\"" },
  { tag: "Events", q: "เข้าถึง native event object ใน inline handler ใช้?",
    options: ["<code>event</code>", "<code>$event</code>", "<code>e</code>", "<code>this.event</code>"], answer: 1,
    exp: "ใช้ $event เช่น @input=\"update($event.target.value)\"" },
  { tag: "Events", q: "child emit event ไป parent ใน <code>&lt;script setup&gt;</code> ใช้?",
    options: ["<code>this.$emit()</code>", "<code>defineEmits()</code> + เรียก emit", "<code>useEmit()</code>", "<code>emit()</code> ตรงๆ"], answer: 1,
    exp: "const emit = defineEmits(['update']) แล้วเรียก emit('update', value)" },
  { tag: "Events", q: "modifier <code>.stop</code> ใน <code>@click.stop</code> ทำหน้าที่?",
    options: ["preventDefault", "stopPropagation", "ทำงานครั้งเดียว", "ทำงานเมื่อกด capture phase"], answer: 1,
    exp: ".stop = event.stopPropagation(), .prevent = preventDefault, .once = ครั้งเดียว" },

  // ===== v-if / v-show (26-30) =====
  { tag: "Directives", q: "directive ใดที่ <strong>ลบ element ออกจาก DOM</strong> เมื่อ false?",
    options: ["<code>v-show</code>", "<code>v-hide</code>", "<code>v-if</code>", "<code>v-bind</code>"], answer: 2,
    exp: "v-if สร้าง/ทำลาย element จริง — v-show แค่ toggle CSS display" },
  { tag: "Directives", q: "<code>v-show</code> ทำงานยังไง?",
    options: ["ลบ element ออกจาก DOM", "toggle CSS <code>display</code>", "ใส่ opacity 0", "ครอบด้วย comment"], answer: 1,

const form = document.getElementById('quizForm');
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
})[c]);

questions.forEach((q, i) => {

// ============ Progress tracking ============
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const progressPercent = document.getElementById('progressPercent');
function updateProgress() {
  const answered = new Set();
  form.querySelectorAll('input[type=radio]:checked').forEach(r => answered.add(r.name));
  const n = answered.size;
  const pct = Math.round((n / questions.length) * 100);
  progressText.textContent = `ตอบแล้ว ${n}/${questions.length}`;
  progressFill.style.width = pct + '%';
  progressPercent.textContent = pct + '%';
}

// ============ SQLite (sql.js) ============
const SCHEMA_SQL = `
  CREATE TABLE IF NOT EXISTS attempts (
    id          INTEGER PRIMARY KEY AUTOINCREMENT,
    started_at  TEXT NOT NULL,
    finished_at TEXT,
    score       INTEGER,
    total       INTEGER NOT NULL DEFAULT 50
  );
  CREATE TABLE IF NOT EXISTS answers (
    id              INTEGER PRIMARY KEY AUTOINCREMENT,
    attempt_id      INTEGER NOT NULL,
    question_index  INTEGER NOT NULL,
    question_tag    TEXT,
    question_text   TEXT,
    selected_option INTEGER,
    correct_option  INTEGER NOT NULL,
    is_correct      INTEGER NOT NULL,
    user_note       TEXT,
    created_at      TEXT NOT NULL,
    FOREIGN KEY(attempt_id) REFERENCES attempts(id)
  );
  CREATE INDEX IF NOT EXISTS idx_answers_attempt ON answers(attempt_id);
  CREATE UNIQUE INDEX IF NOT EXISTS uq_answers_attempt_q ON answers(attempt_id, question_index);
`;

const DB_KEY = 'vue-quiz:db';
let SQL = null;
let db = null;
let currentAttemptId = null;
let saveTimer = null;
const dbStatus = document.getElementById('dbStatus');

function setStatus(state, text) {
  dbStatus.className = 'db-status ' + state;
  dbStatus.textContent = text;
}

function persist() {
  try {
    const bytes = db.export();
    let s = '';
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
      s += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    localStorage.setItem(DB_KEY, btoa(s));
    setStatus('ready', 'บันทึกแล้ว');
  } catch (e) {
    console.error('persist failed', e);
    setStatus('error', 'บันทึกไม่สำเร็จ (อาจเต็ม) — ลอง Export');
  }
}

function getOne(sql, params = []) {
  const r = db.exec(sql, params);
  if (!r.length || !r[0].values.length) return null;
  return r[0].values[0];
}

function ensureCurrentAttempt() {
  if (currentAttemptId) return currentAttemptId;
  const row = getOne("SELECT id FROM attempts WHERE finished_at IS NULL ORDER BY id DESC LIMIT 1");
  if (row) {
    currentAttemptId = row[0];
  } else {
    db.run("INSERT INTO attempts (started_at, total) VALUES (?, ?)",
      [new Date().toISOString(), questions.length]);
    currentAttemptId = getOne("SELECT last_insert_rowid()")[0];
  }
  return currentAttemptId;
}

function upsertAnswer(qIdx, fields) {
  ensureCurrentAttempt();
  const q = questions[qIdx];
  const ex = getOne("SELECT id, selected_option, user_note FROM answers WHERE attempt_id = ? AND question_index = ?",
    [currentAttemptId, qIdx]);
  const now = new Date().toISOString();

  let selected = fields.selected_option !== undefined ? fields.selected_option : (ex ? ex[1] : null);
  let note = fields.user_note !== undefined ? fields.user_note : (ex ? ex[2] : null);
  const isCorrect = (selected !== null && selected === q.answer) ? 1 : 0;

  if (ex) {
    db.run(`UPDATE answers SET selected_option = ?, is_correct = ?, user_note = ? WHERE id = ?`,
      [selected, isCorrect, note, ex[0]]);
  } else {
    db.run(`INSERT INTO answers (attempt_id, question_index, question_tag, question_text,
              selected_option, correct_option, is_correct, user_note, created_at)
            VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)`,
      [currentAttemptId, qIdx, q.tag, q.q, selected, q.answer, isCorrect, note, now]);
  }
}

function debouncedPersist() {
  setStatus('saving', 'กำลังบันทึก...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 500);
}

function restoreDraft() {
  const row = getOne("SELECT id FROM attempts WHERE finished_at IS NULL ORDER BY id DESC LIMIT 1");
  if (!row) return;
  currentAttemptId = row[0];
  const r = db.exec("SELECT question_index, selected_option, user_note FROM answers WHERE attempt_id = ?",
    [currentAttemptId]);
  if (!r.length) return;
  r[0].values.forEach(([qIdx, sel, note]) => {
    if (sel !== null && sel !== undefined) {
      const radio = form.querySelector(`input[name="q${qIdx}"][value="${sel}"]`);
      if (radio) radio.checked = true;
    }
    if (note) {
      const ta = form.querySelector(`textarea[data-q="${qIdx}"]`);
      if (ta) {
        ta.value = note;
        ta.classList.add('has-content');
        ta.closest('.note-toggle').open = true;
      }
    }
  });
  updateProgress();
}

async function initDb() {
  try {
    SQL = await initSqlJs({
      locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${f}`
    });
    const stored = localStorage.getItem(DB_KEY);
    if (stored) {
      const bytes = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
      db = new SQL.Database(bytes);
    } else {
      db = new SQL.Database();
    }
    db.exec(SCHEMA_SQL);
    setStatus('ready', 'พร้อมใช้งาน');
    restoreDraft();
  } catch (e) {
    console.error('initDb failed', e);
    setStatus('error', 'โหลด SQLite ไม่สำเร็จ (ตรวจ network)');
  }
}

// ============ Auto-save handlers ============
form.addEventListener('change', (e) => {
  updateProgress();
  if (!db) return;
  const t = e.target;
  if (t.matches('input[type=radio]')) {
    const qIdx = parseInt(t.name.slice(1));
    upsertAnswer(qIdx, { selected_option: parseInt(t.value) });
    debouncedPersist();
  }
});

form.addEventListener('input', (e) => {
  if (!db) return;
  const t = e.target;
  if (t.matches('textarea.user-note')) {
    const qIdx = parseInt(t.dataset.q);
    t.classList.toggle('has-content', t.value.trim().length > 0);
    upsertAnswer(qIdx, { user_note: t.value });
    debouncedPersist();
  }
});

// ============ Submit ============
function finalizeAttempt(score) {
  ensureCurrentAttempt();
  // ensure every question has a row (insert NULL for unanswered so detail view is complete)
  for (let i = 0; i < questions.length; i++) {
    upsertAnswer(i, {});
  }
  db.run("UPDATE attempts SET finished_at = ?, score = ? WHERE id = ?",
    [new Date().toISOString(), score, currentAttemptId]);
  const finishedId = currentAttemptId;
  currentAttemptId = null;
  persist();
  return finishedId;
}

document.getElementById('submitBtn').addEventListener('click', () => {
  let score = 0;
  questions.forEach((q, i) => {
    const checked = form.querySelector(`input[name="q${i}"]:checked`);
    const opts = form.querySelectorAll(`label[data-q="${i}"]`);
    opts.forEach(o => o.classList.remove('correct', 'wrong'));
    document.getElementById('exp' + i).classList.add('show');

    opts[q.answer].classList.add('correct');
    if (checked) {
      const v = parseInt(checked.value);
      if (v === q.answer) score++;
      else opts[v].classList.add('wrong');
    }
  });
  document.getElementById('score').textContent = score;
  let grade = '';
  const pct = (score / questions.length) * 100;
  if (pct >= 90) grade = 'ยอดเยี่ยม! 🎉 เข้าใจ Vue.js เป็นอย่างดี';
  else if (pct >= 75) grade = 'ดีมาก! 👍 พื้นฐานแน่น';
  else if (pct >= 60) grade = 'ผ่านเกณฑ์ 💪 ฝึกเพิ่มอีกนิดจะดีมาก';
  else if (pct >= 40) grade = 'ต้องทบทวนพื้นฐานเพิ่มเติม 📚';
  else grade = 'แนะนำให้เริ่มจาก Vue Docs - The Essentials 🌱';
  document.getElementById('grade').textContent = grade;
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'center' });

  if (db) finalizeAttempt(score);
});

// ============ Reset (start new attempt — keeps history) ============
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('เริ่ม attempt ใหม่? คำตอบและบันทึกใน attempt ปัจจุบันจะถูก finalize เป็น 0 ถ้ายังไม่ได้ส่ง')) return;
  // discard current draft attempt (delete its unfinished row + answers)
  if (db && currentAttemptId) {
    db.run("DELETE FROM answers WHERE attempt_id = ?", [currentAttemptId]);
    db.run("DELETE FROM attempts WHERE id = ? AND finished_at IS NULL", [currentAttemptId]);
    currentAttemptId = null;
    persist();
  }
  form.reset();
  form.querySelectorAll('.option').forEach(o => o.classList.remove('correct', 'wrong'));
  form.querySelectorAll('.explanation').forEach(e => e.classList.remove('show'));
  form.querySelectorAll('textarea.user-note').forEach(t => t.classList.remove('has-content'));
  form.querySelectorAll('.note-toggle').forEach(d => d.open = false);
  document.getElementById('resultCard').classList.remove('show');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ============ Export / Import ============
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!db) { alert('DB ยังไม่พร้อม'); return; }
  const bytes = db.export();
  const blob = new Blob([bytes], { type: 'application/x-sqlite3' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 16);
  a.href = url;
  a.download = `vue-quiz-${ts}.sqlite`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !SQL) return;
  if (!confirm(`Import "${file.name}" จะแทนที่ฐานข้อมูลปัจจุบันทั้งหมด ดำเนินการต่อ?`)) {
    e.target.value = '';
    return;
  }
  try {
    const buf = await file.arrayBuffer();
    db = new SQL.Database(new Uint8Array(buf));
    db.exec(SCHEMA_SQL); // ensure schema upgrade-safe
    persist();
    // reset UI then restore
    form.reset();
    form.querySelectorAll('.option').forEach(o => o.classList.remove('correct', 'wrong'));
    form.querySelectorAll('.explanation').forEach(el => el.classList.remove('show'));
    form.querySelectorAll('textarea.user-note').forEach(t => { t.value = ''; t.classList.remove('has-content'); });
    form.querySelectorAll('.note-toggle').forEach(d => d.open = false);
    document.getElementById('resultCard').classList.remove('show');
    currentAttemptId = null;
    restoreDraft();
    renderHistory();
    alert('นำเข้าฐานข้อมูลสำเร็จ');
  } catch (err) {
    console.error(err);
    alert('Import ล้มเหลว: ไฟล์อาจไม่ใช่ SQLite ที่ valid');
  }
  e.target.value = '';
});

// ============ History ============
const historyPanel = document.getElementById('historyPanel');
const historyList = document.getElementById('historyList');
const detailPanel = document.getElementById('detailPanel');
const detailList = document.getElementById('detailList');
const detailTitle = document.getElementById('detailTitle');

function renderHistory() {
  if (!db) return;
  const r = db.exec(`SELECT id, started_at, finished_at, score, total FROM attempts
                     WHERE finished_at IS NOT NULL ORDER BY id DESC LIMIT 50`);
  historyList.innerHTML = '';
  if (!r.length || !r[0].values.length) {
    historyList.innerHTML = '<p class="muted">ยังไม่มีประวัติ — ทำ quiz แล้วกดส่งคำตอบเพื่อบันทึก</p>';
    return;
  }
  r[0].values.forEach(([id, started, finished, score, total]) => {
    const dt = new Date(finished).toLocaleString('th-TH');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div>
        <strong>Attempt #${id}</strong>
        <div class="muted">${dt}</div>
      </div>
      <div>
        <span class="badge">${score}/${total}</span>
        <button type="button" class="btn-ghost btn-sm" data-attempt="${id}">รายละเอียด</button>
      </div>
    `;
    historyList.appendChild(item);
  });
}

historyList.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-attempt]');
  if (!btn) return;
  showAttemptDetail(parseInt(btn.dataset.attempt));
});

function showAttemptDetail(attemptId) {
  const meta = getOne("SELECT started_at, finished_at, score, total FROM attempts WHERE id = ?", [attemptId]);
  if (!meta) return;
  const r = db.exec(`SELECT question_index, question_tag, question_text, selected_option, correct_option, is_correct, user_note
                     FROM answers WHERE attempt_id = ? ORDER BY question_index`, [attemptId]);
  detailTitle.textContent = `Attempt #${attemptId} · ${meta[2]}/${meta[3]} · ${new Date(meta[1]).toLocaleString('th-TH')}`;
  detailList.innerHTML = '';
  if (!r.length) { detailList.innerHTML = '<p class="muted">ไม่มีข้อมูลคำตอบ</p>'; return; }
  r[0].values.forEach(([qIdx, tag, qText, sel, correct, isCorr, note]) => {
    const q = questions[qIdx];
    const cls = sel === null ? 'skipped' : (isCorr ? 'correct' : 'wrong');
    const status = sel === null ? '⊘ ไม่ได้ตอบ' : (isCorr ? '✓ ถูก' : '✗ ผิด');
    const selText = sel === null ? '<em class="muted">—</em>' : (q ? q.options[sel] : `option ${sel}`);
    const corText = q ? q.options[correct] : `option ${correct}`;
    const row = document.createElement('div');
    row.className = 'detail-row ' + cls;
    row.innerHTML = `
      <div><strong>${qIdx + 1}. [${escapeHtml(tag)}]</strong> ${qText} <span class="muted">— ${status}</span></div>
      <div class="muted" style="margin-top:4px">เลือก: ${selText}</div>
      ${!isCorr ? `<div class="muted">เฉลย: ${corText}</div>` : ''}
      ${note ? `<div class="note">📝 ${escapeHtml(note)}</div>` : ''}
    `;
    detailList.appendChild(row);
  });
  detailPanel.classList.add('show');
  detailPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('historyBtn').addEventListener('click', () => {
  if (!db) { alert('DB ยังไม่พร้อม'); return; }
  renderHistory();
  historyPanel.classList.toggle('show');
  if (historyPanel.classList.contains('show')) {
    historyPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});
document.getElementById('closeHistoryBtn').addEventListener('click', () => historyPanel.classList.remove('show'));
document.getElementById('closeDetailBtn').addEventListener('click', () => detailPanel.classList.remove('show'));

// ============ Boot ============
initDb();
</script>
</body>
</html>
