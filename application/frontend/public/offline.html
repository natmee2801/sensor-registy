<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ออฟไลน์ — Lumen.registry</title>
    <style>
      html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:#020617;color:#fff;display:flex;align-items:center;justify-content:center}
      .card{max-width:540px;padding:28px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));box-shadow:0 6px 24px rgba(0,0,0,0.6);text-align:center}
      h1{margin:0 0 8px 0;font-size:20px}
      p{margin:0;color:#cbd5e1}
      button{margin-top:16px;padding:8px 14px;border-radius:8px;border:0;background:#f59e0b;color:#111;font-weight:700}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>คุณกำลังออฟไลน์</h1>
      <p>ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ ขอลองอีกครั้งเมื่อออนไลน์</p>
      <button onclick="location.reload()">ลองอีกครั้ง</button>
    </div>
  </body>
</html>
