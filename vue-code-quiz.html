<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vue Code Playground - 30 Exercises</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-2: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --primary: #42b883;
    --primary-dark: #35495e;
    --warn: #fbbf24;
    --correct: #22c55e;
    --wrong: #ef4444;
    --border: #475569;
    --code-bg: #0b1220;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header.page-header {
    text-align: center;
    padding: 24px 20px;
    background: var(--card);
    border-radius: 16px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  header.page-header h1 {
    margin: 0 0 6px;
    font-size: 28px;
    color: var(--primary);
  }
  header.page-header p { margin: 4px 0; color: var(--muted); font-size: 14px; }
  .db-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
  }
  .db-status::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #6b7280;
  }
  .db-status.ready::before { background: var(--correct); }
  .db-status.saving::before { background: var(--warn); animation: pulse 1s infinite; }
  .db-status.error::before { background: var(--wrong); }
  @keyframes pulse { 50% { opacity: 0.4; } }

  .progress-bar {
    position: sticky;
    top: 10px;
    z-index: 20;
    background: var(--card);
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
  }
  .progress-track {
    flex: 1;
    height: 8px;
    background: var(--card-2);
    border-radius: 4px;
    margin: 0 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0%;
    transition: width 0.3s ease;
  }

  .topic-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    padding: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .chip {
    padding: 6px 12px;
    background: var(--card-2);
    color: var(--text);
    border-radius: 99px;
    text-decoration: none;
    font-size: 13px;
    border: 1px solid transparent;
    transition: all 0.15s;
    cursor: pointer;
  }
  .chip:hover { border-color: var(--primary); color: var(--primary); }

  .topic-section { margin-bottom: 32px; }
  .topic-section h2 {
    margin: 0 0 14px;
    padding: 10px 16px;
    background: var(--primary-dark);
    border-left: 4px solid var(--primary);
    border-radius: 6px;
    font-size: 18px;
    color: var(--primary);
    scroll-margin-top: 80px;
  }

  .exercise {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .exercise:hover { border-color: var(--primary); }
  .ex-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .ex-num {
    background: var(--primary);
    color: #0f172a;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 13px;
    min-width: 36px;
    text-align: center;
  }
  .ex-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--card-2);
    color: var(--muted);
  }
  .ex-status.success { background: rgba(34,197,94,0.15); color: var(--correct); }
  .ex-status.error { background: rgba(239,68,68,0.15); color: var(--wrong); }
  .ex-status.done { background: rgba(66,184,131,0.2); color: var(--primary); }
  .ex-title {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    flex: 1;
    min-width: 180px;
  }
  .ex-goal {
    color: var(--muted);
    font-size: 14px;
    margin: 6px 0 14px;
    padding: 10px 12px;
    background: var(--card-2);
    border-radius: 6px;
    border-left: 3px solid var(--primary);
  }
  .ex-goal code {
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--warn);
    font-size: 13px;
  }

  .editors {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .editor {
    display: flex;
    flex-direction: column;
  }
  .editor label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .editor textarea {
    width: 100%;
    background: var(--code-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: ui-monospace, "Cascadia Code", "Fira Code", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    resize: vertical;
    min-height: 130px;
    tab-size: 2;
  }
  .editor textarea:focus { outline: none; border-color: var(--primary); }

  .ex-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-run { background: var(--primary); color: #0f172a; }
  .btn-secondary { background: var(--card-2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-done { background: var(--card-2); color: var(--text); border: 1px solid var(--border); }
  .btn-done.active { background: var(--primary); color: #0f172a; border-color: var(--primary); }

  .preview-wrap {
    background: white;
    color: #111;
    border-radius: 8px;
    padding: 14px 16px;
    min-height: 60px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", sans-serif;
    overflow: auto;
  }
  .preview-wrap.error {
    background: #fee2e2;
    color: #991b1b;
    border-left: 4px solid var(--wrong);
    font-family: ui-monospace, monospace;
    font-size: 13px;
    white-space: pre-wrap;
  }
  .preview-wrap input,
  .preview-wrap textarea,
  .preview-wrap button {
    font: inherit;
    color: #111;
    padding: 4px 10px;
    border: 1px solid #999;
    border-radius: 4px;
    margin: 2px;
  }
  .preview-wrap button {
    background: #e5e7eb;
    cursor: pointer;
  }
  .preview-wrap button:hover { background: #d1d5db; }
  .preview-wrap .pill {
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid #999;
    cursor: pointer;
    background: white;
  }
  .preview-wrap .active {
    background: #42b883 !important;
    color: white !important;
    border-color: #42b883 !important;
  }
  .preview-wrap .danger {
    background: #ef4444 !important;
    color: white !important;
    border-color: #ef4444 !important;
  }
  .preview-wrap ul, .preview-wrap ol { margin: 6px 0; padding-left: 22px; }
  .preview-wrap label { display: inline-flex; align-items: center; gap: 4px; margin-right: 10px; }

  .ex-hint {
    margin-top: 8px;
    padding: 10px 12px;
    background: rgba(251,191,36,0.1);
    border-left: 3px solid var(--warn);
    border-radius: 6px;
    font-size: 13px;
    color: var(--muted);
    display: none;
  }
  .ex-hint.show { display: block; }

  .note-toggle {
    margin-top: 12px;
    border-top: 1px dashed var(--border);
    padding-top: 10px;
  }
  .note-toggle summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    user-select: none;
    list-style: none;
  }
  .note-toggle summary::-webkit-details-marker { display: none; }
  .note-toggle summary::before { content: "▸ "; }
  .note-toggle[open] summary::before { content: "▾ "; }
  .user-note {
    width: 100%;
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--card-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    min-height: 50px;
  }
  .user-note:focus { outline: none; border-color: var(--primary); }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 24px 0;
    flex-wrap: wrap;
  }
  .actions .btn { padding: 12px 22px; font-size: 14px; }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 18px;
    display: none;
  }
  .panel.show { display: block; }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .panel-header h2 { margin: 0; font-size: 18px; color: var(--primary); }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    background: var(--card-2);
    border-radius: 6px;
    margin-bottom: 6px;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 13px;
  }
  .history-item .err {
    color: var(--wrong);
    font-family: ui-monospace, monospace;
    font-size: 12px;
    flex-basis: 100%;
    margin-top: 4px;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 12px;
  }
  .badge.success { background: rgba(34,197,94,0.2); color: var(--correct); }
  .badge.error { background: rgba(239,68,68,0.2); color: var(--wrong); }
  .muted { color: var(--muted); font-size: 13px; }

  @media (max-width: 720px) {
    body { padding: 12px; }
    .editors { grid-template-columns: 1fr; }
    header.page-header h1 { font-size: 22px; }
    .exercise { padding: 14px; }
    .actions .btn { flex: 1 1 calc(50% - 12px); }
  }
</style>
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
</head>
<body>
<div class="container">
  <header class="page-header">
    <h1>Vue Code Playground</h1>
    <p>30 exercises ครอบคลุม Vue 3 พื้นฐาน — เขียน code แล้วกด ▶ Run เห็นผลทันที</p>
    <p>
      <span class="muted">บันทึกอัตโนมัติเป็น SQLite</span>
      <span id="dbStatus" class="db-status">กำลังโหลด...</span>
    </p>
  </header>

  <div class="progress-bar">
    <span id="progressText">ทำเสร็จ 0/30</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span id="progressPercent">0%</span>
  </div>

  <nav class="topic-chips" id="topicChips"></nav>

  <div id="historyPanel" class="panel">
    <div class="panel-header">
      <h2>📚 ประวัติการ Run</h2>
      <button type="button" class="btn btn-ghost" id="closeHistoryBtn">ปิด</button>
    </div>
    <div id="historyList"></div>
  </div>

  <main id="exercisesRoot"></main>

  <div class="actions">
    <button type="button" class="btn btn-ghost" id="historyBtn">📚 ประวัติ Run</button>
    <button type="button" class="btn btn-ghost" id="exportBtn">📥 Export .sqlite</button>
    <button type="button" class="btn btn-ghost" id="importBtn">📤 Import .sqlite</button>
    <input type="file" id="importFile" accept=".sqlite,.db,application/x-sqlite3" style="display:none">
  </div>
</div>

<script>
// ============================================================
// 30 EXERCISES (3 per topic × 10 topics)
// ============================================================
const EXERCISES = [
  // ─── Topic 1: Structure & Mounting ───
  {
    topic: 'Structure & Mounting',
    title: 'Hello World',
    goal: 'แสดงข้อความ "สวัสดี Vue!" ใน <h1> โดยใช้ <code>ref</code>',
    starterTemplate: `<h1>...</h1>`,
    starterScript: `// สร้าง message ด้วย ref('สวัสดี Vue!')\n// แล้ว return ออกมาให้ template ใช้\n\nreturn {}`,
    solutionTemplate: `<h1>{{ message }}</h1>`,
    solutionScript: `const message = ref('สวัสดี Vue!')\nreturn { message }`,
    hint: 'ref() เก็บค่า reactive — ใส่ใน return จะใช้ใน template ได้ {{ message }}'
  },
  {
    topic: 'Structure & Mounting',
    title: 'Two bindings, same data',
    goal: 'แสดงค่า <code>name</code> 2 ที่ใน <code>&lt;h2&gt;</code> และ <code>&lt;p&gt;</code> — แก้ name ครั้งเดียวอัพเดต 2 จุด',
    starterTemplate: `<div>\n  <h2>Hello, ?</h2>\n  <p>name: ?</p>\n</div>`,
    starterScript: `// สร้าง name ref แล้ว return\n\nreturn {}`,
    solutionTemplate: `<div>\n  <h2>Hello, {{ name }}!</h2>\n  <p>name: {{ name }}</p>\n</div>`,
    solutionScript: `const name = ref('Vue')\nreturn { name }`,
    hint: 'ตัวแปรเดียวกันสามารถใส่ {{ }} ได้หลายที่ — Vue จะอัปเดตทุกจุดอัตโนมัติ'
  },
  {
    topic: 'Structure & Mounting',
    title: 'Multiple root nodes (Fragment)',
    goal: 'Vue 3 รองรับ multiple root — สร้าง <code>&lt;h2&gt;</code> + <code>&lt;p&gt;</code> โดยไม่ต้องครอบ <code>&lt;div&gt;</code>',
    starterTemplate: `<h2>...</h2>\n<p>...</p>`,
    starterScript: `// สร้าง title และ body แยก ref กัน\n\nreturn {}`,
    solutionTemplate: `<h2>{{ title }}</h2>\n<p>{{ body }}</p>`,
    solutionScript: `const title = ref('หัวข้อหลัก')\nconst body = ref('เนื้อหาด้านล่าง')\nreturn { title, body }`,
    hint: 'Vue 3 ไม่บังคับให้ root เป็น single element แล้ว ต่างจาก Vue 2'
  },

  // ─── Topic 2: State (ref) ───
  {
    topic: 'State (ref)',
    title: 'Counter +/-',
    goal: 'ปุ่ม + เพิ่ม count, ปุ่ม - ลด count, แสดงค่า count',
    starterTemplate: `<div>\n  <p>Count: 0</p>\n  <button>+</button>\n  <button>-</button>\n</div>`,
    starterScript: `// const count = ref(0)\n\nreturn {}`,
    solutionTemplate: `<div>\n  <p>Count: {{ count }}</p>\n  <button @click="count++">+</button>\n  <button @click="count--">-</button>\n</div>`,
    solutionScript: `const count = ref(0)\nreturn { count }`,
    hint: 'ใน template ใช้ count ตรงๆ (auto-unwrap) — ไม่ต้องใส่ .value'
  },
  {
    topic: 'State (ref)',
    title: 'Toggle boolean',
    goal: 'ปุ่ม toggle <code>open</code> และแสดงสถานะ "เปิด" / "ปิด"',
    starterTemplate: `<div>\n  <button>Toggle</button>\n  <p>?</p>\n</div>`,
    starterScript: `\nreturn {}`,
    solutionTemplate: `<div>\n  <button @click="open = !open">Toggle</button>\n  <p>{{ open ? 'เปิด' : 'ปิด' }}</p>\n</div>`,
    solutionScript: `const open = ref(false)\nreturn { open }`,
    hint: 'ใช้ ternary expression ใน {{ }} ได้: {{ cond ? a : b }}'
  },
  {
    topic: 'State (ref)',
    title: 'Input bound to ref',
    goal: 'input + แสดงตัวอักษรที่พิมพ์แบบ realtime ใต้ input',
    starterTemplate: `<div>\n  <input placeholder="พิมพ์...">\n  <p>คุณพิมพ์: ?</p>\n</div>`,
    starterScript: `\nreturn {}`,
    solutionTemplate: `<div>\n  <input v-model="text" placeholder="พิมพ์...">\n  <p>คุณพิมพ์: {{ text }}</p>\n</div>`,
    solutionScript: `const text = ref('')\nreturn { text }`,
    hint: 'v-model="text" สร้าง two-way binding ระหว่าง input และ ref'
  },

  // ─── Topic 3: State (reactive) ───
  {
    topic: 'State (reactive)',
    title: 'User profile object',
    goal: 'แสดง <code>user.name</code> และ <code>user.age</code>, ปุ่ม "อายุ +1" เพิ่มอายุ',
    starterTemplate: `<div>\n  <p>? - อายุ ?</p>\n  <button>อายุ +1</button>\n</div>`,
    starterScript: `// const user = reactive({ name: 'Alice', age: 25 })\n\nreturn {}`,
    solutionTemplate: `<div>\n  <p>{{ user.name }} - อายุ {{ user.age }}</p>\n  <button @click="user.age++">อายุ +1</button>\n</div>`,
    solutionScript: `const user = reactive({ name: 'Alice', age: 25 })\nreturn { user }`,
    hint: 'reactive() ใช้กับ object — เข้าถึงตรงๆ user.age (ไม่มี .value)'
  },
  {
    topic: 'State (reactive)',
    title: 'Todo array push',
    goal: 'พิมพ์ใน input + กด "เพิ่ม" → push เข้า list, แสดงเป็น <code>&lt;ul&gt;</code>',
    starterTemplate: `<div>\n  <input>\n  <button>Add</button>\n  <ul>\n    <!-- v-for here -->\n  </ul>\n</div>`,
    starterScript: `// text = ref(''), todos = reactive([]), function add() { ... }\n\nreturn {}`,
    solutionTemplate: `<div>\n  <input v-model="text" @keyup.enter="add">\n  <button @click="add">Add</button>\n  <ul>\n    <li v-for="(t, i) in todos" :key="i">{{ t }}</li>\n  </ul>\n</div>`,
    solutionScript: `const text = ref('')\nconst todos = reactive([])\nfunction add() {\n  if (text.value.trim()) {\n    todos.push(text.value.trim())\n    text.value = ''\n  }\n}\nreturn { text, todos, add }`,
    hint: 'reactive([]) → push ตรงๆ ได้ Vue track ให้อัตโนมัติ'
  },
  {
    topic: 'State (reactive)',
    title: 'Nested object counter',
    goal: 'เพิ่มคะแนนใน <code>state.score</code> ด้วยปุ่ม +10',
    starterTemplate: `<div>\n  <p>Score: ?</p>\n  <button>+10</button>\n</div>`,
    starterScript: `\nreturn {}`,
    solutionTemplate: `<div>\n  <p>Score: {{ state.score }}</p>\n  <button @click="state.score += 10">+10</button>\n</div>`,
    solutionScript: `const state = reactive({ score: 0 })\nreturn { state }`,
    hint: 'reactive object รองรับ nested property อัตโนมัติ — แก้ deep ได้เลย'
  },

  // ─── Topic 4: Props ───
  {
    topic: 'Props',
    title: 'Receive title prop',
    goal: 'รับ prop <code>title</code> จาก parent มาแสดงเป็น <code>&lt;h1&gt;</code>',
    propsSpec: { title: { type: String, default: '(no title)' } },
    propsValues: { title: 'หัวข้อจาก parent' },
    starterTemplate: `<h1>?</h1>`,
    starterScript: `// props auto-available ใน template — return { } ก็พอ\n\nreturn {}`,
    solutionTemplate: `<h1>{{ title }}</h1>`,
    solutionScript: `// props.title ใช้ใน template ได้ทันที\nreturn {}`,
    hint: 'props ที่ประกาศแล้ว ใช้ใน template ได้เลยโดยไม่ต้อง return จาก setup'
  },
  {
    topic: 'Props',
    title: 'Multiple props with default',
    goal: 'รับ <code>name</code> (default "Guest") และ <code>age</code> (default 20) แสดงเป็น "{name} - อายุ {age}"',
    propsSpec: {
      name: { type: String, default: 'Guest' },
      age: { type: Number, default: 20 }
    },
    propsValues: { name: 'Alice' },
    starterTemplate: `<p>? - อายุ ?</p>`,
    starterScript: `\nreturn {}`,
    solutionTemplate: `<p>{{ name }} - อายุ {{ age }}</p>`,
    solutionScript: `return {}`,
    hint: 'props ที่มี default — ถ้า parent ไม่ส่ง จะใช้ค่า default แทน (age = 20)'
  },
  {
    topic: 'Props',
    title: 'Boolean prop',
    goal: 'รับ <code>isVip</code> Boolean — ถ้า true แสดง "VIP ⭐", ถ้า false แสดง "Member"',
    propsSpec: { isVip: { type: Boolean, default: false } },

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// ============================================================
// SQLITE LAYER
// ============================================================
const SCHEMA_SQL = `
  CREATE TABLE IF NOT EXISTS exercises (
    id              INTEGER PRIMARY KEY AUTOINCREMENT,
    exercise_index  INTEGER NOT NULL UNIQUE,
    topic           TEXT NOT NULL,
    title           TEXT NOT NULL,
    user_template   TEXT,
    user_script     TEXT,
    user_note       TEXT,
    status          TEXT,
    last_run_at     TEXT,
    last_error      TEXT,
    updated_at      TEXT NOT NULL
  );
  CREATE TABLE IF NOT EXISTS run_history (
    id              INTEGER PRIMARY KEY AUTOINCREMENT,
    exercise_index  INTEGER NOT NULL,
    status          TEXT NOT NULL,
    error_message   TEXT,
    ran_at          TEXT NOT NULL
  );
  CREATE INDEX IF NOT EXISTS idx_runs_ex ON run_history(exercise_index);
`;
const DB_KEY = 'vue-code-quiz:db';
let SQL = null;
let db = null;
let saveTimer = null;
const dbStatusEl = document.getElementById('dbStatus');

function setDbStatus(state, text) {
  dbStatusEl.className = 'db-status ' + state;
  dbStatusEl.textContent = text;
}

function persist() {
  try {
    const bytes = db.export();
    let s = '';
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
      s += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    localStorage.setItem(DB_KEY, btoa(s));
    setDbStatus('ready', 'บันทึกแล้ว');
  } catch (e) {
    console.error('persist failed', e);
    setDbStatus('error', 'บันทึกไม่สำเร็จ — ลอง Export');
  }
}

function debouncedPersist() {
  setDbStatus('saving', 'กำลังบันทึก...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 500);
}

function getOne(sql, params = []) {
  const r = db.exec(sql, params);
  if (!r.length || !r[0].values.length) return null;
  return r[0].values[0];
}

function upsertExercise(idx, fields) {
  const ex = EXERCISES[idx];
  const existing = getOne("SELECT user_template, user_script, user_note, status FROM exercises WHERE exercise_index = ?", [idx]);
  const now = new Date().toISOString();
  const tpl = fields.user_template !== undefined ? fields.user_template : (existing ? existing[0] : null);
  const scr = fields.user_script !== undefined ? fields.user_script : (existing ? existing[1] : null);
  const note = fields.user_note !== undefined ? fields.user_note : (existing ? existing[2] : null);
  const status = fields.status !== undefined ? fields.status : (existing ? existing[3] : 'idle');
  const lastRun = fields.last_run_at !== undefined ? fields.last_run_at : null;
  const lastErr = fields.last_error !== undefined ? fields.last_error : null;

  if (existing) {
    db.run(`UPDATE exercises SET user_template = ?, user_script = ?, user_note = ?, status = ?,
              last_run_at = COALESCE(?, last_run_at), last_error = ?, updated_at = ?
            WHERE exercise_index = ?`,
      [tpl, scr, note, status, lastRun, lastErr, now, idx]);
  } else {
    db.run(`INSERT INTO exercises (exercise_index, topic, title, user_template, user_script, user_note,
              status, last_run_at, last_error, updated_at)
            VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
      [idx, ex.topic, ex.title, tpl, scr, note, status, lastRun, lastErr, now]);
  }
}

function logRun(idx, status, errorMessage) {
  db.run(`INSERT INTO run_history (exercise_index, status, error_message, ran_at) VALUES (?, ?, ?, ?)`,
    [idx, status, errorMessage || null, new Date().toISOString()]);
}

async function initDb() {
  try {
    SQL = await initSqlJs({
      locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${f}`
    });
    const stored = localStorage.getItem(DB_KEY);
    if (stored) {
      const bytes = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
      db = new SQL.Database(bytes);
    } else {
      db = new SQL.Database();
    }
    db.exec(SCHEMA_SQL);
    setDbStatus('ready', 'พร้อมใช้งาน');
    restoreAll();
  } catch (e) {
    console.error('initDb failed', e);
    setDbStatus('error', 'โหลด SQLite ไม่สำเร็จ');
  }
}

function restoreAll() {
  const r = db.exec("SELECT exercise_index, user_template, user_script, user_note, status FROM exercises");
  if (!r.length) return;
  r[0].values.forEach(([idx, tpl, scr, note, status]) => {
    const card = document.getElementById('ex-' + idx);
    if (!card) return;
    if (tpl !== null) card.querySelector('textarea.tpl').value = tpl;
    if (scr !== null) card.querySelector('textarea.scr').value = scr;
    if (note !== null) {
      const ta = card.querySelector('textarea.note');
      ta.value = note;
      if (note.trim()) ta.closest('details').open = true;
    }
    if (status) updateStatusBadge(idx, status, false);
  });
  updateProgress();
}

// ============================================================
// VUE RUNTIME — compile + mount user code
// ============================================================
const apps = new Map();   // exercise idx → Vue app instance

function showRunError(idx, errorText) {
  const previewEl = document.getElementById('preview-' + idx);
  previewEl.classList.add('error');
  previewEl.textContent = String(errorText);
}

function showRunOk(idx) {
  const previewEl = document.getElementById('preview-' + idx);
  previewEl.classList.remove('error');
}

function updateStatusBadge(idx, status, save = true) {
  const card = document.getElementById('ex-' + idx);
  if (!card) return;
  const badge = card.querySelector('.ex-status');
  badge.className = 'ex-status ' + status;
  const icons = { idle: '⊘ ยังไม่ได้รัน', success: '✓ Run สำเร็จ', error: '✗ Error', done: '★ ทำเสร็จแล้ว' };
  badge.textContent = icons[status] || status;
  // sync done button visual
  const doneBtn = card.querySelector('.btn-done');
  if (doneBtn) doneBtn.classList.toggle('active', status === 'done');
  if (save && db) {
    upsertExercise(idx, { status });
    debouncedPersist();
  }
  updateProgress();
}

function runExercise(idx) {
  const ex = EXERCISES[idx];
  const card = document.getElementById('ex-' + idx);
  const tpl = card.querySelector('textarea.tpl').value;
  const scr = card.querySelector('textarea.scr').value;
  const previewEl = document.getElementById('preview-' + idx);

  // unmount previous
  if (apps.has(idx)) {
    try { apps.get(idx).unmount(); } catch {}
    apps.delete(idx);
  }
  previewEl.classList.remove('error');
  previewEl.innerHTML = '';

  let errorMsg = null;
  try {
    if (typeof Vue === 'undefined') {
      throw new Error('Vue ยังโหลดไม่เสร็จ — ลองอีกครั้งใน 1 วินาที');
    }
    const setupFn = new Function(
      'ref', 'reactive', 'computed', 'watch',
      'onMounted', 'onUnmounted', 'nextTick', 'props',
      scr || 'return {}'
    );
    const Component = {
      template: tpl || '<div></div>',
      props: ex.propsSpec || {},
      setup(props) {
        const result = setupFn(
          Vue.ref, Vue.reactive, Vue.computed, Vue.watch,
          Vue.onMounted, Vue.onUnmounted, Vue.nextTick, props
        );
        return result || {};
      }
    };
    const app = Vue.createApp(Component, ex.propsValues || {});
    app.config.errorHandler = (err) => {
      errorMsg = (err && err.message) || String(err);
      showRunError(idx, '[runtime] ' + errorMsg);
    };
    app.config.warnHandler = (msg) => {
      console.warn('[Vue warn ex#' + (idx + 1) + ']', msg);
    };
    app.mount(previewEl);

    if (errorMsg) {
      logRun(idx, 'error', errorMsg);
      const cur = getOne("SELECT status FROM exercises WHERE exercise_index = ?", [idx]);
      if (!cur || cur[0] !== 'done') updateStatusBadge(idx, 'error');
      upsertExercise(idx, { last_run_at: new Date().toISOString(), last_error: errorMsg });
    } else {
      apps.set(idx, app);
      logRun(idx, 'success', null);
      const cur = getOne("SELECT status FROM exercises WHERE exercise_index = ?", [idx]);
      if (!cur || cur[0] !== 'done') updateStatusBadge(idx, 'success');
      upsertExercise(idx, { last_run_at: new Date().toISOString(), last_error: null });
    }
  } catch (e) {
    errorMsg = (e && e.message) || String(e);
    showRunError(idx, '[error] ' + errorMsg);
    logRun(idx, 'error', errorMsg);
    const cur = db ? getOne("SELECT status FROM exercises WHERE exercise_index = ?", [idx]) : null;
    if (!cur || cur[0] !== 'done') updateStatusBadge(idx, 'error');
    if (db) upsertExercise(idx, { last_run_at: new Date().toISOString(), last_error: errorMsg });
  }
  if (db) debouncedPersist();
}

function resetExercise(idx) {
  if (!confirm(`รีเซ็ต exercise #${idx + 1} กลับเป็น starter code?`)) return;
  const ex = EXERCISES[idx];
  const card = document.getElementById('ex-' + idx);
  card.querySelector('textarea.tpl').value = ex.starterTemplate;
  card.querySelector('textarea.scr').value = ex.starterScript;
  if (apps.has(idx)) {
    try { apps.get(idx).unmount(); } catch {}
    apps.delete(idx);
  }
  document.getElementById('preview-' + idx).innerHTML = '';
  document.getElementById('preview-' + idx).classList.remove('error');
  updateStatusBadge(idx, 'idle');
  if (db) {
    upsertExercise(idx, {
      user_template: ex.starterTemplate,
      user_script: ex.starterScript,
      status: 'idle',
      last_error: null
    });
    debouncedPersist();
  }
}

function showSolution(idx) {
  if (!confirm(`แสดงเฉลยของ exercise #${idx + 1}? (จะแทนที่ code ปัจจุบัน)`)) return;
  const ex = EXERCISES[idx];
  const card = document.getElementById('ex-' + idx);
  card.querySelector('textarea.tpl').value = ex.solutionTemplate;
  card.querySelector('textarea.scr').value = ex.solutionScript;
  if (db) {
    upsertExercise(idx, {
      user_template: ex.solutionTemplate,
      user_script: ex.solutionScript
    });
    debouncedPersist();
  }
  runExercise(idx);
}

function toggleDone(idx) {
  const card = document.getElementById('ex-' + idx);
  const badge = card.querySelector('.ex-status');
  const isDone = badge.classList.contains('done');
  updateStatusBadge(idx, isDone ? 'idle' : 'done');
}

function toggleHint(idx) {
  document.getElementById('hint-' + idx).classList.toggle('show');
}

// ============================================================
// PROGRESS
// ============================================================
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const progressPercent = document.getElementById('progressPercent');

function updateProgress() {
  let done = 0;
  for (let i = 0; i < EXERCISES.length; i++) {
    const card = document.getElementById('ex-' + i);
    if (card && card.querySelector('.ex-status').classList.contains('done')) done++;
  }
  const pct = Math.round((done / EXERCISES.length) * 100);
  progressText.textContent = `ทำเสร็จ ${done}/${EXERCISES.length}`;
  progressFill.style.width = pct + '%';
  progressPercent.textContent = pct + '%';
}

// ============================================================
// RENDER UI
// ============================================================
function tabKeyHandler(e) {
  if (e.key !== 'Tab' || e.shiftKey) return;
  e.preventDefault();
  const ta = e.target;
  const start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + '  ' + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + 2;
  ta.dispatchEvent(new Event('input', { bubbles: true }));
}

function render() {
  const root = document.getElementById('exercisesRoot');
  const chips = document.getElementById('topicChips');

  // group by topic preserving order
  const topics = [];
  const topicMap = new Map();
  EXERCISES.forEach((ex, idx) => {
    if (!topicMap.has(ex.topic)) {
      topicMap.set(ex.topic, []);
      topics.push(ex.topic);
    }
    topicMap.get(ex.topic).push({ ex, idx });
  });

  topics.forEach((topic, ti) => {
    const anchor = 'topic-' + ti;
    const chip = document.createElement('a');
    chip.className = 'chip';
    chip.href = '#' + anchor;
    chip.textContent = topic;
    chips.appendChild(chip);

    const section = document.createElement('section');
    section.className = 'topic-section';
    const h2 = document.createElement('h2');
    h2.id = anchor;
    h2.textContent = topic;
    section.appendChild(h2);

    topicMap.get(topic).forEach(({ ex, idx }) => {
      const card = document.createElement('article');
      card.className = 'exercise';
      card.id = 'ex-' + idx;
      card.innerHTML = `
        <div class="ex-header">
          <span class="ex-num">#${idx + 1}</span>
          <h3 class="ex-title">${escapeHtml(ex.title)}</h3>
          <span class="ex-status idle">⊘ ยังไม่ได้รัน</span>
        </div>
        <div class="ex-goal"><strong>เป้าหมาย:</strong> ${ex.goal}</div>
        ${ex.propsValues ? `<div class="muted" style="margin-bottom:10px">📦 props ที่ส่งให้: <code style="background:var(--code-bg);padding:2px 6px;border-radius:3px;color:var(--warn)">${escapeHtml(JSON.stringify(ex.propsValues))}</code></div>` : ''}
        <div class="editors">
          <div class="editor">
            <label>Template (HTML)</label>
            <textarea class="tpl" spellcheck="false" rows="8"></textarea>
          </div>
          <div class="editor">
            <label>Script (setup body — must end with <code>return {...}</code>)</label>
            <textarea class="scr" spellcheck="false" rows="8"></textarea>
          </div>
        </div>
        <div class="ex-actions">
          <button type="button" class="btn btn-run" data-act="run" data-idx="${idx}">▶ Run</button>
          <button type="button" class="btn btn-secondary" data-act="reset" data-idx="${idx}">↺ Reset</button>
          <button type="button" class="btn btn-ghost" data-act="solution" data-idx="${idx}">💡 ดูเฉลย</button>
          <button type="button" class="btn btn-ghost" data-act="hint" data-idx="${idx}">❓ Hint</button>
          <button type="button" class="btn btn-done" data-act="done" data-idx="${idx}">✓ ทำเสร็จแล้ว</button>
        </div>
        <div id="hint-${idx}" class="ex-hint">${ex.hint || ''}</div>
        <div id="preview-${idx}" class="preview-wrap"></div>
        <details class="note-toggle">
          <summary>📝 บันทึกของฉัน (เหตุผล / สิ่งที่เรียนรู้)</summary>
          <textarea class="note user-note" rows="3" placeholder="จดความเข้าใจ / ข้อสังเกต ของคุณ..."></textarea>
        </details>
      `;
      section.appendChild(card);

      // fill starters
      card.querySelector('textarea.tpl').value = ex.starterTemplate;
      card.querySelector('textarea.scr').value = ex.starterScript;
    });
    root.appendChild(section);
  });

  // Delegated handlers
  root.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx);
    switch (btn.dataset.act) {
      case 'run': runExercise(idx); break;
      case 'reset': resetExercise(idx); break;
      case 'solution': showSolution(idx); break;
      case 'hint': toggleHint(idx); break;
      case 'done': toggleDone(idx); break;
    }
  });

  // Auto-save on input (debounced)
  root.addEventListener('input', (e) => {
    if (!db) return;
    const t = e.target;
    const card = t.closest('.exercise');
    if (!card) return;
    const idx = parseInt(card.id.slice(3));
    if (t.matches('textarea.tpl')) {
      upsertExercise(idx, { user_template: t.value });
      debouncedPersist();
    } else if (t.matches('textarea.scr')) {
      upsertExercise(idx, { user_script: t.value });
      debouncedPersist();
    } else if (t.matches('textarea.note')) {
      upsertExercise(idx, { user_note: t.value });
      debouncedPersist();
    }
  });

  // Tab key on all code textareas
  root.querySelectorAll('textarea.tpl, textarea.scr').forEach(ta => {
    ta.addEventListener('keydown', tabKeyHandler);
  });
}

// ============================================================
// EXPORT / IMPORT / HISTORY
// ============================================================
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!db) { alert('DB ยังไม่พร้อม'); return; }
  const bytes = db.export();
  const blob = new Blob([bytes], { type: 'application/x-sqlite3' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 16);
  a.href = url;
  a.download = `vue-code-quiz-${ts}.sqlite`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !SQL) return;
  if (!confirm(`Import "${file.name}" จะแทนที่ฐานข้อมูลปัจจุบัน — ดำเนินการต่อ?`)) {
    e.target.value = '';
    return;
  }
  try {
    const buf = await file.arrayBuffer();
    db = new SQL.Database(new Uint8Array(buf));
    db.exec(SCHEMA_SQL);
    persist();
    // reset all UI then restore
    EXERCISES.forEach((_, idx) => {
      const card = document.getElementById('ex-' + idx);
      if (apps.has(idx)) { try { apps.get(idx).unmount(); } catch {} apps.delete(idx); }
      card.querySelector('textarea.tpl').value = EXERCISES[idx].starterTemplate;
      card.querySelector('textarea.scr').value = EXERCISES[idx].starterScript;
      card.querySelector('textarea.note').value = '';
      document.getElementById('preview-' + idx).innerHTML = '';
      document.getElementById('preview-' + idx).classList.remove('error');
      updateStatusBadge(idx, 'idle', false);
    });
    restoreAll();
    alert('นำเข้าฐานข้อมูลสำเร็จ');
  } catch (err) {
    console.error(err);
    alert('Import ล้มเหลว: ไฟล์อาจไม่ใช่ SQLite ที่ valid');
  }
  e.target.value = '';
});

const historyPanel = document.getElementById('historyPanel');
const historyList = document.getElementById('historyList');

function renderHistory() {
  if (!db) return;
  const r = db.exec(`SELECT exercise_index, status, error_message, ran_at
                     FROM run_history ORDER BY id DESC LIMIT 50`);
  historyList.innerHTML = '';
  if (!r.length || !r[0].values.length) {
    historyList.innerHTML = '<p class="muted">ยังไม่มีประวัติ — ลองกด ▶ Run ที่ exercise ใดก็ได้</p>';
    return;
  }
  r[0].values.forEach(([idx, status, err, ts]) => {
    const ex = EXERCISES[idx];
    const dt = new Date(ts).toLocaleString('th-TH');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div>
        <strong>#${idx + 1}</strong> ${escapeHtml(ex ? ex.title : 'unknown')}
        <div class="muted">${dt}</div>
      </div>
      <div>
        <span class="badge ${status}">${status === 'success' ? '✓ success' : '✗ error'}</span>
        <button type="button" class="btn btn-ghost" data-jump="${idx}">ไปที่ข้อ</button>
      </div>
      ${err ? `<div class="err">${escapeHtml(err)}</div>` : ''}
    `;
    historyList.appendChild(item);
  });
}

historyList.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-jump]');
  if (!btn) return;
  const idx = parseInt(btn.dataset.jump);
  document.getElementById('ex-' + idx).scrollIntoView({ behavior: 'smooth', block: 'start' });
});

document.getElementById('historyBtn').addEventListener('click', () => {
  if (!db) { alert('DB ยังไม่พร้อม'); return; }
  renderHistory();
  historyPanel.classList.toggle('show');
  if (historyPanel.classList.contains('show')) {
    historyPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});
document.getElementById('closeHistoryBtn').addEventListener('click', () => historyPanel.classList.remove('show'));

// ============================================================
// BOOT
// ============================================================
render();
initDb();
</script>
